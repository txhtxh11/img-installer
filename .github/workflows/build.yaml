name: "Build Armbian Installer ISO"

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "版本类型"
        required: true
        default: "standard"
        type: choice
        options:
          - "standard"
          - "debian12_minimal"
          - "ubuntu24_minimal"
          - "homeassistant_debian12_minimal"

jobs:
  build-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      VERSION_TYPE: ${{ github.event.inputs.version_type }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: ./build.sh

      - name: Inject 32-bit EFI boot files for Atom Z3745
        run: |
          sudo apt update && sudo apt install -y mtools grub-efi-ia32-bin
          ISO_FILE=$(ls output/*.iso | head -1)
          echo "处理 ISO: $ISO_FILE"
          mkdir -p /tmp/efi/boot
          
          # 从系统 GRUB 包复制 32位 EFI 文件
          cp /usr/lib/grub/ia32-efi/monolithic/bootia32.efi /tmp/efi/boot/bootia32.efi
          cp /usr/lib/grub/ia32-efi/monolithic/grubia32.efi /tmp/efi/boot/grubia32.efi
          
          # 注入到 ISO
          mmd -i "$ISO_FILE@@1M" ::EFI/BOOT 2>/dev/null || true
          mcopy -i "$ISO_FILE@@1M" -o /tmp/efi/boot/* ::EFI/BOOT/
          
          echo "✅ 32位 EFI 注入完成！"

      - name: Prepare Release Assets
        run: |
          case "$VERSION_TYPE" in
            "debian12_minimal")
              FINAL_NAME="armbian-installer-x86_64-debian12_minimal-z3745.iso"
              ;;
            "ubuntu24_minimal")
              FINAL_NAME="armbian-installer-x86_64-ubuntu24_minimal-z3745.iso"
              ;;
            "homeassistant_debian12_minimal")
              FINAL_NAME="armbian-installer-x86_64-homeassistant_debian12_minimal-z3745.iso"
              ;;
            *)
              FINAL_NAME="armbian-installer-x86_64-standard-z3745.iso"
              ;;
          esac
          mv output/*.iso "output/${FINAL_NAME}"

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "Armbian-Z3745-${{ github.event.inputs.version_type }}"
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
