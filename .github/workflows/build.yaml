name: "Build Armbian Installer ISO (32-bit UEFI for Atom Z3745)"

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "版本类型"
        required: true
        default: "standard"
        type: choice
        options:
          - "standard"
          - "debian12_minimal"
          - "ubuntu24_minimal"
          - "homeassistant_debian12_minimal"

jobs:
  build-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      VERSION_TYPE: ${{ github.event.inputs.version_type }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node.js 警告

    steps:
      - uses: actions/checkout@v4

      # 构建原始 ISO（假设你的构建脚本为 build.sh）
      - name: Build Image
        run: |
          chmod +x build.sh
          ./build.sh

      # ==============================================
      # 为 Atom Z3745 (64位CPU + 32位UEFI) 注入 32位 EFI 引导文件
      # ==============================================
      - name: Inject 32-bit EFI boot files
        run: |
          # 安装 mtools（用于操作 ISO 的 FAT 分区）
          sudo apt update && sudo apt install -y mtools
          
          # 定位生成的 ISO 文件
          ISO_FILE=$(ls output/*.iso | head -1)
          echo "Found ISO: $ISO_FILE"
          
          # 创建临时目录存放 32位 EFI 文件
          mkdir -p /tmp/efi/boot
          
          # 从你的 GitHub 仓库下载稳定的 32位 EFI 文件
          # （仓库地址：https://github.com/txhtxh11/my-efi-files）
          echo "Downloading bootia32.efi from personal repo..."
          wget -q -O /tmp/efi/boot/bootia32.efi \
            https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/bootia32.efi
          
          echo "Downloading grubia32.efi from personal repo..."
          wget -q -O /tmp/efi/boot/grubia32.efi \
            https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/grubia32.efi
          
          # 验证文件是否下载成功且大小大于 0
          if [ ! -s /tmp/efi/boot/bootia32.efi ]; then
            echo "❌ bootia32.efi 下载失败或为空"
            exit 1
          fi
          if [ ! -s /tmp/efi/boot/grubia32.efi ]; then
            echo "⚠️ grubia32.efi 下载失败或为空，可能不影响启动，继续..."
          fi
          
          # 将文件注入到 ISO 的 EFI 分区
          echo "Injecting 32-bit EFI files into ISO..."
          # 创建 EFI/BOOT 目录（如果不存在，错误忽略）
          mmd -i "$ISO_FILE@@1M" ::EFI/BOOT 2>/dev/null || true
          # 复制文件
          mcopy -i "$ISO_FILE@@1M" -o /tmp/efi/boot/* ::EFI/BOOT/
          
          # 验证注入结果
          echo "Verifying injection:"
          mdir -i "$ISO_FILE@@1M" ::EFI/BOOT/
          echo "✅ 32-bit EFI injection completed successfully!"

      # 重命名 ISO 文件，加入版本类型标识和 -z3745 后缀
      - name: Prepare Release Assets
        run: |
          case "$VERSION_TYPE" in
            "debian12_minimal")
              FINAL_NAME="armbian-installer-x86_64-debian12_minimal-z3745.iso"
              ;;
            "ubuntu24_minimal")
              FINAL_NAME="armbian-installer-x86_64-ubuntu24_minimal-z3745.iso"
              ;;
            "homeassistant_debian12_minimal")
              FINAL_NAME="armbian-installer-x86_64-homeassistant_debian12_minimal-z3745.iso"
              ;;
            *)
              FINAL_NAME="armbian-installer-x86_64-standard-z3745.iso"
              ;;
          esac
          mv output/*.iso "output/${FINAL_NAME}"
          echo "Renamed ISO to: ${FINAL_NAME}"

      # 生成 Release 说明（可选）
      - name: Generate Release Notes
        run: |
          cat > info.md << 'EOF'
# Armbian Installer for Atom Z3745 (32-bit UEFI)

## 适用硬件
- Intel Atom Z3735 / Z3745 / Z3736 系列  
- 64位 CPU + 32位 UEFI 的平板/迷你主机（如台电、昂达、酷比魔方、联想 Miix 等）

## 特性
- ✅ 已注入 **32位 UEFI** 引导文件（bootia32.efi + grubia32.efi）
- ✅ 支持直接从 U 盘启动，无需修改 BIOS
- ✅ 可选 Debian 12 / Ubuntu 24.04 / Home Assistant 环境

## 安装方法
1. 使用 [Rufus](https://rufus.ie/) 或 [Etcher](https://www.balena.io/etcher/) 写入 U 盘
2. 从 U 盘启动（可能需要关闭 Secure Boot）
3. 运行 `ddd` 一键安装到 eMMC / SSD

## 版本说明
- **standard**: 标准 Armbian 系统
- **debian12_minimal**: 精简 Debian 12
- **ubuntu24_minimal**: 精简 Ubuntu 24.04
- **homeassistant_debian12_minimal**: 预装 Home Assistant 的 Debian 12

---
构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
EOF
          echo "Release notes generated (info.md)"

      # 发布 Release
      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "Armbian-Z3745-${{ github.event.inputs.version_type }}"
          body_path: info.md
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
