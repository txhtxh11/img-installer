name: "Build Armbian HA (32-bit UEFI for Z3745)"

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Armbian 版本"
        required: true
        default: "homeassistant_debian12_minimal"
        type: choice
        options:
          - homeassistant_debian12_minimal
          - debian12_minimal

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Armbian Image
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Inject 32-bit UEFI Boot Files
        run: |
          sudo apt update && sudo apt install -y mtools
          ISO=$(ls output/*.iso | head -1)
          mkdir -p /tmp/efi/boot

          # 下载 32位 EFI 文件（双源兜底）
          wget -q -O /tmp/efi/boot/bootia32.efi https://github.com/tianocore/tianocore.github.io/raw/master/grub/bootia32.efi || \
          wget -q -O /tmp/efi/boot/bootia32.efi https://github.com/ipxe/ipxe/raw/master/bin-i386-efi/ipxe.efi || exit 1

          wget -q -O /tmp/efi/boot/grubia32.efi https://github.com/tianocore/tianocore.github.io/raw/master/grub/grubia32.efi || true

          # 注入文件
          mmd -i "$ISO@@1M" ::EFI/BOOT 2>/dev/null || true
          mcopy -i "$ISO@@1M" -o /tmp/efi/boot/* ::EFI/BOOT/

          echo "✅ 32位 EFI 注入完成"

      - name: Rename ISO
        run: |
          mv output/*.iso "output/armbian-${{ github.event.inputs.version_type }}-z3745.iso"

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "Armbian-Z3745-${{ github.event.inputs.version_type }}"
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
