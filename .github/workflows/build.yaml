name: "Build Armbian Installer ISO (32-bit UEFI for Atom Z3745)"

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "版本类型"
        required: true
        default: "standard"
        type: choice
        options:
          - "standard"
          - "debian12_minimal"
          - "ubuntu24_minimal"
          - "homeassistant_debian12_minimal"

jobs:
  build-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      VERSION_TYPE: ${{ github.event.inputs.version_type }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Inject 32-bit EFI boot files
        run: |
          sudo apt update && sudo apt install -y xorriso wget
          ISO_FILE=$(ls output/*.iso | head -1)
          mkdir -p /tmp/efi_files
          wget -q -O /tmp/efi_files/bootia32.efi https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/bootia32.efi
          wget -q -O /tmp/efi_files/grubia32.efi https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/grubia32.efi
          xorriso -as mkisofs -V "Armbian_Installer" -J -joliet-long -r -o "$ISO_FILE" -M "$ISO_FILE" -graft-points /EFI/BOOT/bootia32.efi=/tmp/efi_files/bootia32.efi /EFI/BOOT/grubia32.efi=/tmp/efi_files/grubia32.efi 2>/dev/null
          echo "✅ 32-bit EFI injected"

      - name: Prepare Release Assets
        run: |
          case "$VERSION_TYPE" in
            "debian12_minimal") FINAL_NAME="armbian-installer-x86_64-debian12_minimal-z3745.iso" ;;
            "ubuntu24_minimal") FINAL_NAME="armbian-installer-x86_64-ubuntu24_minimal-z3745.iso" ;;
            "homeassistant_debian12_minimal") FINAL_NAME="armbian-installer-x86_64-homeassistant_debian12_minimal-z3745.iso" ;;
            *) FINAL_NAME="armbian-installer-x86_64-standard-z3745.iso" ;;
          esac
          mv output/*.iso "output/${FINAL_NAME}"

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "Armbian-Z3745-${{ github.event.inputs.version_type }}"
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
