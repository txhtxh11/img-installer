name: Build Armbian Installer ISO (32-bit UEFI for Atom Z3745)

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "版本类型"
        required: true
        default: "standard"
        type: choice
        options:
          - "standard"
          - "debian12_minimal"
          - "ubuntu24_minimal"
          - "homeassistant_debian12_minimal"

jobs:
  build-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      VERSION_TYPE: ${{ github.event.inputs.version_type }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Build full Armbian Live ISO
        run: |
          sudo apt update
          sudo apt install -y wget xz-utils squashfs-tools xorriso isolinux syslinux-common kpartx

          case "$VERSION_TYPE" in
            homeassistant_debian12_minimal)
              IMG_URL="https://dl.armbian.com/uefi-x86/Trixie_current_server-homeassistant"
              ;;
            debian12_minimal)
              IMG_URL="https://dl.armbian.com/uefi-x86/Bookworm_current_minimal"
              ;;
            ubuntu24_minimal)
              IMG_URL="https://dl.armbian.com/uefi-x86/Noble_current_minimal"
              ;;
            *)
              IMG_URL="https://dl.armbian.com/uefi-x86/Bookworm_current"
              ;;
          esac

          mkdir -p armbian work/staging/live work/staging/isolinux output
          wget -O armbian/armbian.img.xz "$IMG_URL"
          unxz -v armbian/armbian.img.xz

          # === 修复：使用 kpartx 正确映射磁盘镜像 ===
          sudo kpartx -av armbian/armbian.img
          # 这条命令的输出会显示映射的设备，通常是 '/dev/mapper/loopXpY'
          # 我们使用一个更简单的方法：losetup -P 来自动探测分区
          sudo losetup -P /dev/loop0 armbian/armbian.img
          # 假设根分区是第一个分区 (/dev/loop0p1)
          sudo mkdir -p /mnt/armbian
          sudo mount /dev/loop0p1 /mnt/armbian

          # 复制内核和 initrd
          KERNEL=$(ls /mnt/armbian/boot/vmlinuz-* | head -1)
          INITRD=$(ls /mnt/armbian/boot/initrd.img-* | head -1)
          sudo cp "$KERNEL" work/staging/live/vmlinuz
          sudo cp "$INITRD" work/staging/live/initrd

          # 创建 squashfs
          sudo mksquashfs /mnt/armbian work/staging/live/filesystem.squashfs -comp gzip -b 1M

          # 清理
          sudo umount /mnt/armbian
          sudo losetup -d /dev/loop0

          # 准备 ISO 引导
          sudo cp /usr/lib/ISOLINUX/isolinux.bin work/staging/isolinux/
          sudo cp /usr/lib/syslinux/modules/bios/*.c32 work/staging/isolinux/ 2>/dev/null || true

          cat > work/staging/isolinux/isolinux.cfg << 'EOF'
          DEFAULT live
          LABEL live
            KERNEL /live/vmlinuz
            APPEND initrd=/live/initrd boot=live quiet splash
          EOF

          # 生成 ISO
          sudo xorriso -as mkisofs -V "Armbian_Live" -J -joliet-long -r \
            -o output/armbian-installer-x86_64-${VERSION_TYPE}.iso \
            -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot -e boot/grub/efi.img -no-emul-boot work/staging

          sudo chmod 666 output/*.iso
          ls -lh output/

      # ==============================================
      # 从你的仓库下载 32位 EFI 文件并注入
      # ==============================================
      - name: Inject 32-bit EFI boot files from personal repo
        run: |
          ISO_FILE=$(ls output/*.iso | head -1)
          mkdir -p /tmp/efi_files

          wget -q -O /tmp/efi_files/bootia32.efi \
            https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/bootia32.efi

          wget -q -O /tmp/efi_files/grubia32.efi \
            https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/grubia32.efi

          if [ ! -s /tmp/efi_files/bootia32.efi ]; then
            echo "ERROR: bootia32.efi download failed or empty"
            exit 1
          fi

          xorriso -dev "$ISO_FILE" \
            -add /tmp/efi_files/bootia32.efi -- /EFI/BOOT/bootia32.efi \
            -add /tmp/efi_files/grubia32.efi -- /EFI/BOOT/grubia32.efi \
            -commit -eject all

          echo "✅ 32-bit EFI injection completed."

      - name: Prepare Release Assets
        run: |
          case "$VERSION_TYPE" in
            debian12_minimal)
              FINAL_NAME="armbian-installer-x86_64-debian12_minimal-z3745.iso"
              ;;
            ubuntu24_minimal)
              FINAL_NAME="armbian-installer-x86_64-ubuntu24_minimal-z3745.iso"
              ;;
            homeassistant_debian12_minimal)
              FINAL_NAME="armbian-installer-x86_64-homeassistant_debian12_minimal-z3745.iso"
              ;;
            *)
              FINAL_NAME="armbian-installer-x86_64-standard-z3745.iso"
              ;;
          esac
          mv output/*.iso "output/${FINAL_NAME}"

      # === 修复：升级 action-gh-release 到 v4 以消除 Node 警告 ===
      - name: Publish Release
        uses: softprops/action-gh-release@v4
        with:
          tag_name: Armbian-Z3745-${{ github.event.inputs.version_type }}
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
