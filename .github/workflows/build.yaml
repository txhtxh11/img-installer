name: "Build Armbian Installer ISO (32-bit UEFI for Atom Z3745)"

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "版本类型"
        required: true
        default: "standard"
        type: choice
        options:
          - "standard"
          - "debian12_minimal"
          - "ubuntu24_minimal"
          - "homeassistant_debian12_minimal"

jobs:
  build-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      VERSION_TYPE: ${{ github.event.inputs.version_type }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Image
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Inject 32-bit EFI boot files for Atom Z3745
        run: |
          sudo apt update && sudo apt install -y mtools
          ISO_FILE=$(ls output/*.iso | head -1)
          echo "Found ISO: $ISO_FILE"
          mkdir -p /tmp/efi/boot
          
          # 从你的 GitHub 仓库下载稳定的 32-bit EFI 文件
          echo "Downloading bootia32.efi..."
          wget -q -O /tmp/efi/boot/bootia32.efi \
            https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/bootia32.efi
          
          echo "Downloading grubia32.efi..."
          wget -q -O /tmp/efi/boot/grubia32.efi \
            https://raw.githubusercontent.com/txhtxh11/my-efi-files/main/EFI/BOOT/grubia32.efi
          
          # 验证文件
          if [ ! -s /tmp/efi/boot/bootia32.efi ]; then
            echo "ERROR: bootia32.efi download failed or empty"
            exit 1
          fi
          if [ ! -s /tmp/efi/boot/grubia32.efi ]; then
            echo "WARNING: grubia32.efi download failed or empty, continuing"
          fi
          
          # 注入 ISO
          echo "Injecting EFI files..."
          mmd -i "$ISO_FILE@@1M" ::EFI/BOOT 2>/dev/null || true
          mcopy -i "$ISO_FILE@@1M" -o /tmp/efi/boot/* ::EFI/BOOT/
          
          echo "Verifying injection:"
          mdir -i "$ISO_FILE@@1M" ::EFI/BOOT/
          echo "✅ 32-bit EFI injection completed."

      - name: Prepare Release Assets
        run: |
          case "$VERSION_TYPE" in
            "debian12_minimal")
              FINAL_NAME="armbian-installer-x86_64-debian12_minimal-z3745.iso"
              ;;
            "ubuntu24_minimal")
              FINAL_NAME="armbian-installer-x86_64-ubuntu24_minimal-z3745.iso"
              ;;
            "homeassistant_debian12_minimal")
              FINAL_NAME="armbian-installer-x86_64-homeassistant_debian12_minimal-z3745.iso"
              ;;
            *)
              FINAL_NAME="armbian-installer-x86_64-standard-z3745.iso"
              ;;
          esac
          mv output/*.iso "output/${FINAL_NAME}"
          echo "FINAL_NAME=${FINAL_NAME}" >> $GITHUB_ENV

      - name: Generate Release Notes
        run: |
          echo "# Armbian Installer for Atom Z3745 (32-bit UEFI)" > info.md
          echo "" >> info.md
          echo "## 适用硬件" >> info.md
          echo "- Intel Atom Z3735 / Z3745 / Z3736 系列" >> info.md
          echo "- 64位 CPU + 32位 UEFI 的平板/迷你主机" >> info.md
          echo "" >> info.md
          echo "## 特性" >> info.md
          echo "- ✅ 已注入 **32位 UEFI** 引导文件 (bootia32.efi + grubia32.efi)" >> info.md
          echo "- ✅ 支持直接从 U 盘启动，无需修改 BIOS" >> info.md
          echo "- ✅ 可选 Debian 12 / Ubuntu 24.04 / Home Assistant 环境" >> info.md
          echo "" >> info.md
          echo "## 安装方法" >> info.md
          echo "1. 使用 [Rufus](https://rufus.ie/) 或 [Etcher](https://www.balena.io/etcher/) 写入 U 盘" >> info.md
          echo "2. 从 U 盘启动（可能需要关闭 Secure Boot）" >> info.md
          echo "3. 运行 \`ddd\` 一键安装到 eMMC / SSD" >> info.md
          echo "" >> info.md
          echo "## 版本说明" >> info.md
          echo "- **standard**: 标准 Armbian 系统" >> info.md
          echo "- **debian12_minimal**: 精简 Debian 12" >> info.md
          echo "- **ubuntu24_minimal**: 精简 Ubuntu 24.04" >> info.md
          echo "- **homeassistant_debian12_minimal**: 预装 Home Assistant 的 Debian 12" >> info.md
          echo "" >> info.md
          echo "---" >> info.md
          echo "构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> info.md

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "Armbian-Z3745-${{ github.event.inputs.version_type }}"
          body_path: info.md
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
